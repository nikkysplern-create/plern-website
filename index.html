<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plern Everyday Furniture</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Prompt',sans-serif;
background:#F8F4EE;
color:#2f241c;
}

/* NAV */
header{
position:fixed;
width:100%;
top:0;
background:white;
display:flex;
justify-content:space-between;
padding:18px 60px;
z-index:999;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.logo{font-size:26px;font-weight:700;color:#6B4F3A;}
nav a{margin-left:25px;text-decoration:none;color:#4a382d;}

/* HERO */
.hero{
height:100vh;
background:#EFE7DC;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
font-size:55px;
color:#3B2A1E;
}

/* PRODUCTS */
section{padding:80px 60px;}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* SLIDER */
.slider{position:relative;height:380px;}
.slide{
position:absolute;
width:100%;height:100%;
object-fit:cover;
opacity:0;transition:.4s;
}
.slide.active{opacity:1;}

.prev,.next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;border:none;
cursor:pointer;
padding:6px 10px;
border-radius:50%;
}
.prev{left:10px;}
.next{right:10px;}

.card-content{padding:20px;}
.price{color:#7A8450;font-weight:700;}

.btn{
margin-top:10px;
background:#7A8450;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
cursor:pointer;
}

/* CART */
.cart-icon{
position:fixed;
bottom:30px;
right:30px;
background:#7A8450;
color:white;
padding:14px;
border-radius:30px;
cursor:pointer;
}

.cart{
position:fixed;
right:-450px;
top:0;
width:400px;
height:100%;
background:white;
padding:20px;
transition:.4s;
}
.cart.open{right:0;}

/* PRODUCT POPUP */
.product-modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:white;
width:80%;
max-width:900px;
padding:30px;
border-radius:15px;
display:flex;
gap:20px;
}

.modal-img{
width:50%;
cursor:pointer;
}

.modal-img img{
width:100%;
border-radius:10px;
}

.modal-info{
flex:1;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
color:white;
}

/* ZOOM */
.zoom{
position:fixed;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:3000;
}

.zoom img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<header>
<div class="logo">Plern</div>
</header>

<!-- CART -->
<div class="cart-icon" onclick="toggleCart()">🛒 <span id="count">0</span></div>
<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cart-items"></div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Everyday Furniture</h1>
</div>

<!-- PRODUCTS -->
<section>
<div class="products">

<!-- CARD -->
<div class="card" onclick="openProduct('Wall Frame',120,'product1.jpg')">
<div class="slider">
<img src="product1.jpg" class="slide active">
<img src="product1-2.jpg" class="slide">
<button class="prev" onclick="prevSlide(event,this)">‹</button>
<button class="next" onclick="nextSlide(event,this)">›</button>
</div>
<div class="card-content">
<h3>Wall Frame</h3>
<div class="price">$120</div>
<div class="btn" onclick="addToCart(event,'Wall Frame',120)">Add to Cart</div>
</div>
</div>

</div>
</section>

<!-- PRODUCT MODAL -->
<div class="product-modal" id="modal">
<div class="close" onclick="closeModal()">✕</div>

<div class="modal-content">
<div class="modal-img" onclick="zoomImage()">
<img id="modal-img">
</div>

<div class="modal-info">
<h2 id="modal-title"></h2>
<p>$<span id="modal-price"></span></p>
<div class="btn" onclick="addToCartFromModal()">Add to Cart</div>
</div>
</div>
</div>

<!-- ZOOM -->
<div class="zoom" id="zoom" onclick="closeZoom()">
<img id="zoom-img">
</div>

<script>
let cart=[];
let currentProduct={};

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

function addToCart(e,name,price){
e.stopPropagation();
cart.push({name,price});
renderCart();
}

function addToCartFromModal(){
cart.push(currentProduct);
renderCart();
}

function renderCart(){
let html='';
cart.forEach(i=>{
html+=`<div>${i.name} - $${i.price}</div>`;
});
document.getElementById("cart-items").innerHTML=html;
document.getElementById("count").innerText=cart.length;
}

/* SLIDER */
function nextSlide(e,btn){
e.stopPropagation();
let slides=btn.parentElement.querySelectorAll(".slide");
let i=[...slides].findIndex(s=>s.classList.contains("active"));
slides[i].classList.remove("active");
slides[(i+1)%slides.length
