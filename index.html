<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plern Luxury Furniture</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Prompt',sans-serif;
margin:0;
background:#F6F1EA;
color:#2f241c;
}

/* NAV */
header{
position:fixed;
width:100%;
background:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
z-index:999;
}

.logo{
font-weight:700;
font-size:22px;
}

/* HERO */
.hero{
height:90vh;
background:url('banner.jpg') center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.hero h1{
font-size:60px;
}

/* PRODUCTS */
section{
padding:80px 40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-weight:700;
margin-top:10px;
}

.btn{
margin-top:10px;
display:block;
background:#7A8450;
color:white;
text-align:center;
padding:10px;
border-radius:8px;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.1);
padding:20px;
overflow:auto;
}

.cart h2{
text-align:center;
}

.cart-item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.total{
font-weight:700;
margin-top:15px;
}

/* CHECKOUT */
.checkout{
margin-top:15px;
display:block;
background:black;
color:white;
text-align:center;
padding:12px;
border-radius:10px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<div class="logo">Plern Luxury</div>
</header>

<!-- HERO -->
<div class="hero">
<h1>Luxury Everyday Living</h1>
</div>

<!-- PRODUCTS -->
<section>
<h2>Our Collection</h2>

<div class="products">

<div class="card">
<img src="product1.jpg">
<div class="card-content">
<h3>Minimal Picture</h3>
<p>The man thinking</p>
<div class="price">25,000฿</div>
<div class="btn" onclick="addToCart('The man thinking',25,000฿)">Add to Cart</div>
</div>
</div>

<div class="card">
<img src="product2.jpg">
<div class="card-content">
<h3>Wood Desk</h3>
<p>Natural wood workspace table</p>
<div class="price">$130</div>
<div class="btn" onclick="addToCart('Wood Desk',130)">Add to Cart</div>
</div>
</div>

<div class="card">
<img src="product3.jpg">
<div class="card-content">
<h3>Bed Frame</h3>
<p>Minimal Japanese-style bed</p>
<div class="price">$300</div>
<div class="btn" onclick="addToCart('Bed Frame',300)">Add to Cart</div>
</div>
</div>

</div>
</section>

<!-- CART -->
<div class="cart">
<h2>Your Cart</h2>

<div id="cart-items"></div>

<div class="total" id="total">Total: $0</div>

<a href="https://line.me/ti/p/@yourline" class="checkout">
Checkout via LINE
</a>

</div>

<script>
let cart=[];
let total=0;

function addToCart(name,price){
cart.push({name,price});
total+=price;
renderCart();
}

function renderCart(){
let html='';
cart.forEach(item=>{
html+=`<div class="cart-item">${item.name} - $${item.price}</div>`;
});
document.getElementById('cart-items').innerHTML=html;
document.getElementById('total').innerText='Total: $'+total;
}
</script>

</body>
</html>
