<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plern Furniture</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Prompt',sans-serif;
background:#F8F4EE;
padding:30px;
}

/* TITLE */
.title{
text-align:center;
font-size:34px;
margin-bottom:35px;
color:#3B2A1E;
}

/* GRID 5 ITEMS */
.products{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
}

/* RESPONSIVE */
@media(max-width:1100px){
.products{
grid-template-columns:repeat(3,1fr);
}
}

@media(max-width:700px){
.products{
grid-template-columns:repeat(2,1fr);
}
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
transition:0.25s;
}

.card:hover{
transform:translateY(-3px);
}

/* IMAGE */
.slider{
position:relative;
height:150px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:0.4s;
cursor:pointer;
}

.slide.active{
opacity:1;
}

/* BUTTON */
.prev,
.next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.45);
border:none;
color:white;
font-size:12px;
padding:4px 8px;
cursor:pointer;
border-radius:50%;
}

.prev{
left:5px;
}

.next{
right:5px;
}

/* CONTENT */
.card-content{
padding:10px;
}

.card-content h3{
font-size:14px;
margin-bottom:5px;
}

.price{
font-size:13px;
font-weight:700;
color:#7A8450;
margin-bottom:8px;
}

.btn{
background:#7A8450;
color:white;
font-size:12px;
padding:8px;
text-align:center;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#667042;
}

/* POPUP IMAGE */
.popup{
display:none;
position:fixed;
z-index:9999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.popup img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.popup span{
position:absolute;
top:25px;
right:35px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<h1 class="title">Plern Everyday Furniture</h1>

<div class="products">

<!-- CARD 1 -->
<div class="card">
<div class="slider">
<img src="images/product1.jpg" class="slide active" onclick="openPopup(this.src)">
<img src="images/product1-2.jpg" class="slide" onclick="openPopup(this.src)">

<button class="prev" onclick="prevSlide(this)">‹</button>
<button class="next" onclick="nextSlide(this)">›</button>
</div>

<div class="card-content">

<!-- POPUP -->
<div class="popup" id="popup">
<span onclick="closePopup()">×</span>
<img id="popup-img">
</div>

<script>

/* NEXT IMAGE */
function nextSlide(btn){

let slides = btn.parentElement.querySelectorAll(".slide");

let i = [...slides].findIndex(
s => s.classList.contains("active")
);

slides[i].classList.remove("active");

slides[(i+1)%slides.length]
.classList.add("active");
}

/* PREV IMAGE */
function prevSlide(btn){

let slides = btn.parentElement.querySelectorAll(".slide");

let i = [...slides].findIndex(
s => s.classList.contains("active")
);

slides[i].classList.remove("active");

slides[(i-1+slides.length)%slides.length]
.classList.add("active");
}

/* OPEN POPUP */
function openPopup(src){

document.getElementById("popup").style.display="flex";

document.getElementById("popup-img").src=src;
}

/* CLOSE POPUP */
function closePopup(){

document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
