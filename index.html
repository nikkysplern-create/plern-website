<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plern Furniture</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Prompt',sans-serif;
background:#F8F4EE;
padding:40px;
}

/* GRID */
.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* SMALL IMAGE BOX */
.slider{
position:relative;
width:100%;
height:140px;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:0.4s;
cursor:pointer;
}

.slide.active{
opacity:1;
}

/* BUTTON */
.prev,
.next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
border:none;
color:white;
padding:4px 8px;
cursor:pointer;
border-radius:50%;
font-size:14px;
}

.prev{left:6px;}
.next{right:6px;}

/* CONTENT */
.card-content{
padding:12px;
}

.card-content h3{
font-size:15px;
margin-bottom:6px;
}

.price{
font-size:14px;
font-weight:700;
color:#7A8450;
}

</style>
</head>

<body>

<div class="products">

<!-- 1 -->
<div class="card">
<div class="slider">
<img src="product1.jpg" class="slide active" onclick="openImage(this.src)">
<img src="product1-2.jpg" class="slide" onclick="openImage(this.src)">

<button class="prev" onclick="prevSlide(this)">‹</button>
<button class="next" onclick="nextSlide(this)">›</button>
</div>

<div class="card-content">
<h3>Wall Frame</h3>
<div class="price">$120</div>
</div>
</div>

<!-- 2 -->

<div class="slider">

<button class="next" onclick="nextSlide(this)">›</button>
</div>

<div class="card-content">

</div>

<script>

/* NEXT */
function nextSlide(btn){

let slides = btn.parentElement.querySelectorAll(".slide");

let i = [...slides].findIndex(
s => s.classList.contains("active")
);

slides[i].classList.remove("active");

slides[(i+1)%slides.length]
.classList.add("active");
}

/* PREV */
function prevSlide(btn){

let slides = btn.parentElement.querySelectorAll(".slide");

let i = [...slides].findIndex(
s => s.classList.contains("active")
);

slides[i].classList.remove("active");

slides[(i-1+slides.length)%slides.length]
.classList.add("active");
}

/* CLICK IMAGE */
function openImage(src){
window.open(src, "_blank");
}

</script>
